name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18.18', '20', '22']
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 8.15.9

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install node-gyp
        # pnpm/action-setup@6 stopped bundling node-gyp; the better-sqlite3
        # peer dep needs it to build from source on Node versions without
        # prebuilt binaries (currently 18.18 and 20). Install globally so
        # ``pnpm install`` picks it up.
        run: npm install -g node-gyp

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check
        if: matrix.node == '20'

      - name: Lint
        run: pnpm lint
        if: matrix.node == '20'

      # Build first so workspace deps emit dist/ for downstream typecheck.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Coverage
        if: matrix.node == '20'
        run: pnpm test:coverage

      - name: Upload coverage artifact
        if: matrix.node == '20'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            packages/*/coverage/
          retention-days: 14

  python-test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type-check (mypy, schema subpackage only)
        # mypy strict gated on the schema subpackage; other subpackages add as
        # they ship. Do not mask failures with `|| true` — fix the source.
        run: mypy src/vouchrail/schema

      - name: Test
        run: pytest --cov=vouchrail --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: python/coverage.xml
          retention-days: 14

  conformance:
    name: Cross-language conformance vectors
    needs: [build-test, python-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 8.15.9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node deps
        # --ignore-scripts skips `better-sqlite3`'s node-gyp postinstall; the
        # conformance runner only needs `@vouchrail/schema`, no native deps.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build schema
        run: pnpm --filter='./packages/schema' build

      - name: Install Python SDK
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify (TypeScript runner)
        working-directory: conformance-vectors/runners/ts
        run: pnpm run verify

      - name: Verify (Python runner)
        run: python3 conformance-vectors/runners/python/run.py
